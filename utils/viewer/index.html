<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PosterForest Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f0fdf4; color: #1e293b;
  height: 100vh; display: flex; flex-direction: column;
}

/* ── Header ── */
header {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 10px 20px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.logo { color: #10b981; }
header h1 { font-size: 15px; font-weight: 700; color: #1e293b; letter-spacing: .3px; }
.refresh-btn {
  margin-left: auto; background: #f8fafc; border: 1px solid #e2e8f0;
  color: #64748b; padding: 5px 12px; border-radius: 6px; cursor: pointer;
  font-size: 12px; transition: all .15s;
}
.refresh-btn:hover { background: #d1fae5; border-color: #10b981; color: #059669; }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
aside {
  width: 280px; min-width: 240px; background: #fff;
  border-right: 1px solid #e2e8f0; overflow-y: auto;
}
.sidebar-label {
  padding: 8px 12px 8px 16px; font-size: 10px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  background: #fff; border-bottom: 1px solid #e2e8f0;
}
.sidebar-refresh-btn {
  background: none; border: 1px solid #e2e8f0; border-radius: 5px;
  color: #94a3b8; padding: 2px 8px; cursor: pointer; font-size: 11px;
  transition: all .15s; line-height: 1.6; text-transform: none; letter-spacing: 0;
}
.sidebar-refresh-btn:hover { background: #d1fae5; border-color: #10b981; color: #059669; }
.run-item {
  padding: 12px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer;
  transition: background .1s; position: relative;
}
.run-item:hover  { background: #f8fafc; }
.run-item.active { background: #f0fdf4; border-left: 3px solid #10b981; padding-left: 13px; }
.run-ts    { font-size: 10px; color: #94a3b8; margin-bottom: 3px; }
.run-paper { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 1px; }
.run-model { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden;
             text-overflow: ellipsis; margin-bottom: 6px; }
.run-folder { font-size: 10px; color: #94a3b8; margin-bottom: 2px; font-family: monospace; }
.mini-bar  { height: 3px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
.mini-fill { height: 100%; border-radius: 2px;
             background: linear-gradient(90deg, #10b981, #34d399); transition: width .4s; }
.mini-label { font-size: 10px; color: #94a3b8; margin-top: 3px; }

/* ── Main panel ── */
main { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
/* Tab content wrappers that need explicit flex sizing */
#slideshow-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; }
#filmstrip-wrap { flex-shrink: 0; }
.empty-state {
  display: flex; align-items: center; justify-content: center;
  flex: 1; color: #94a3b8; font-size: 14px;
}

/* ── Run header ── */
.run-header {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 8px 24px 0;
}
.run-title { font-size: 15px; font-weight: 700; color: #1e293b; }
.run-folder-inline { font-size: 10px; color: #94a3b8; font-weight: 500; font-family: monospace; }
.run-meta  { font-size: 11px; color: #64748b; margin-top: 1px; }

/* ── Pipeline Stepper ── */
.stepper {
  display: flex; align-items: flex-start;
  padding: 8px 0 0; overflow-x: auto;
}
.stepper::-webkit-scrollbar { height: 3px; }
.stepper::-webkit-scrollbar-thumb { background: #6ee7b7; border-radius: 2px; }

.step-node {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; min-width: 58px; cursor: default;
}
.step-node.clickable { cursor: pointer; }
.step-node.clickable:hover .step-circle { transform: scale(1.12); box-shadow: 0 0 0 4px rgba(16,185,129,.15); }

.step-connector {
  flex: 1; height: 2px; min-width: 4px;
  background: #e2e8f0; align-self: center;
  margin-bottom: 16px; transition: background .4s;
}
.step-connector.done { background: #10b981; }
.step-connector.flowing {
  background: linear-gradient(90deg, #10b981, #10b981, #d1fae5, #d1fae5);
  background-size: 300% 100%; animation: flow 1.6s linear infinite;
}
@keyframes flow { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

.step-circle {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid #e2e8f0; background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #94a3b8;
  transition: all .2s; flex-shrink: 0;
}
.step-circle.done    { background: #10b981; border-color: #10b981; color: #fff; }
.step-circle.running { border-color: #10b981; color: #059669;
  animation: pulse-ring 1.4s ease-in-out infinite; }
@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,.5); }
  50%       { box-shadow: 0 0 0 5px rgba(16,185,129,0); }
}

.step-label {
  font-size: 9px; color: #94a3b8; text-align: center;
  margin-top: 5px; line-height: 1.3; max-width: 64px; padding-bottom: 2px;
}
.step-label.done    { color: #059669; font-weight: 500; }
.step-label.running { color: #059669; font-weight: 700; }
.step-view-hint {
  font-size: 8px; color: #10b981; margin-top: 1px; opacity: 0;
  transition: opacity .15s;
}
.step-node.clickable:hover .step-view-hint { opacity: 1; }
.step-info {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  margin-top: 3px; width: 100%;
}
.step-stats {
  display: flex; flex-direction: row; align-items: center; gap: 3px; flex-wrap: wrap; justify-content: center;
}
.step-stat {
  font-size: 8px; color: #64748b; white-space: nowrap;
  background: #f1f5f9; border-radius: 3px; padding: 0 4px; line-height: 1.6;
}
.step-stat.done { background: #d1fae5; color: #047857; }
.step-time {
  font-size: 7.5px; color: #475569; text-align: center;
  line-height: 1.5; font-variant-numeric: tabular-nums;
}
.step-time.done { color: #059669; font-weight: 500; }

/* ── Progress strip ── */
.progress-strip {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 24px 10px; background: #fff;
  border-bottom: 1px solid #e2e8f0;
}
.progress-bar-wrap {
  flex: 1; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #10b981, #34d399); transition: width .5s;
}
.progress-text { font-size: 11px; color: #94a3b8; white-space: nowrap; }
.running-badge {
  display: flex; align-items: center; gap: 5px;
  background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 99px;
  padding: 2px 10px; font-size: 10px; font-weight: 600; color: #059669; white-space: nowrap;
}
.running-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #10b981;
  animation: pulse-ring 1.4s ease-in-out infinite;
}

/* ── Token strip ── */
.token-strip {
  display: flex; gap: 6px; padding: 10px 24px; background: #fff;
  border-bottom: 1px solid #e2e8f0; flex-wrap: wrap;
}
.token-chip {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 4px 10px; font-size: 11px; color: #475569;
}
.token-chip b { color: #059669; }

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 4px; padding: 0 24px 0;
  border-bottom: 1px solid #e2e8f0; background: #fff;
  align-items: center;
}
.tab-zoom {
  margin-left: auto; display: flex; align-items: center; gap: 6px;
  padding-right: 4px;
}
.tab-btn {
  padding: 8px 16px; font-size: 12px; font-weight: 600; color: #64748b;
  border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all .15s; white-space: nowrap;
}
.tab-btn:hover { color: #059669; }
.tab-btn.active { color: #059669; border-bottom-color: #10b981; }
.tab-count {
  display: inline-block; background: #f1f5f9; color: #64748b;
  border-radius: 10px; padding: 0 6px; font-size: 10px; margin-left: 4px;
}
.tab-btn.active .tab-count { background: #d1fae5; color: #059669; }

/* ── Slideshow ── */
.slideshow-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; gap: 16px; min-height: 0;
}

.slide-counter {
  font-size: 12px; color: #64748b; font-weight: 500; letter-spacing: .5px;
}

.slide-main {
  display: flex; align-items: center; gap: 12px; max-width: 100%; flex: 1; min-height: 0;
}
.nav-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid #e2e8f0;
  background: #fff; color: #475569; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  position: relative; z-index: 20;
}
.nav-btn:hover:not(:disabled) { background: #d1fae5; border-color: #10b981; color: #059669; }
.nav-btn:disabled { opacity: .3; cursor: default; }

.slide-frame {
  flex: 1; min-width: 0; min-height: 0;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  overflow: auto; contain: paint;
}
.slide-frame img {
  max-width: 100%; max-height: 58vh;
  object-fit: contain; border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,.12); background: #fff;
  cursor: zoom-in; transition: box-shadow .15s;
  flex-shrink: 0;
}
.slide-frame img:hover { box-shadow: 0 6px 28px rgba(0,0,0,.18); }
.zoom-controls {
  display: flex; align-items: center; gap: 4px;
}
.zoom-btn {
  width: 22px; height: 22px; border-radius: 4px; border: 1px solid #e2e8f0;
  background: #fff; color: #475569; font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; line-height: 1; padding: 0;
}
.zoom-btn:hover { background: #d1fae5; border-color: #10b981; color: #059669; }
.zoom-level {
  font-size: 11px; color: #64748b; min-width: 36px; text-align: center;
  font-weight: 500;
}
.slide-caption-info {
  font-size: 11px; color: #475569; font-weight: 500;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  background: #f1f5f9; border-radius: 5px; padding: 2px 8px;
}

/* ── Filmstrip ── */
.filmstrip {
  display: flex; gap: 8px; overflow-x: scroll; padding: 0 24px 18px;
  scroll-behavior: smooth;
  scrollbar-width: auto; scrollbar-color: #6ee7b7 #e2e8f0;
}
.filmstrip::-webkit-scrollbar { height: 16px; }
.filmstrip::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 8px; }
.filmstrip::-webkit-scrollbar-thumb { background: #34d399; border-radius: 8px; border: 3px solid #e2e8f0; }

/* ── Two-row filmstrip (applied + iter) ── */
.filmstrip-2row-outer {
  padding: 0 24px; background: #fff;
}
.filmstrip-row-label {
  position: sticky; left: 0; z-index: 2;
  background: #fff;
  align-self: stretch; display: flex; align-items: center; justify-content: flex-end;
  flex-shrink: 0; width: 52px; padding: 0 8px 0 0;
  font-size: 9px; font-weight: 700; white-space: nowrap;
  letter-spacing: .5px; text-transform: uppercase;
}
.filmstrip-row-label.final-label   { color: #d97706; }
.filmstrip-row-label.applied-label { color: #1d4ed8; }
.filmstrip-row-label.iter-label    { color: #10b981; }
.filmstrip-2row-scroll {
  overflow-x: scroll; overflow-y: hidden;
  display: flex; flex-direction: column; gap: 4px;
  padding: 8px 0 18px; scroll-behavior: smooth;
  scrollbar-width: auto; scrollbar-color: #34d399 #e2e8f0;
}
.filmstrip-2row-scroll::-webkit-scrollbar { height: 16px; }
.filmstrip-2row-scroll::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 8px; }
.filmstrip-2row-scroll::-webkit-scrollbar-thumb { background: #34d399; border-radius: 8px; border: 3px solid #e2e8f0; }
.filmstrip-row { display: flex; gap: 8px; }


.thumb-placeholder {
  width: 104px; height: 72px; flex-shrink: 0;
  background: #f8fafc; border-radius: 6px; border: 2px dashed #e2e8f0;
}

.filmstrip-posbar {
  padding: 4px 24px 12px; font-size: 11px; color: #64748b;
  display: flex; align-items: center; gap: 8px;
}
.filmstrip-posbar .fp-num {
  background: #f1f5f9; border-radius: 10px; padding: 1px 8px;
  font-size: 11px; font-weight: 700; color: #475569; white-space: nowrap;
}
.filmstrip-posbar .fp-cap {
  color: #64748b; font-size: 11px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

.thumb {
  flex-shrink: 0; cursor: pointer; border-radius: 6px; overflow: hidden;
  border: 2px solid transparent; transition: border-color .15s;
  background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.thumb.active { border-color: #10b981; }
.thumb:hover  { border-color: #6ee7b7; }
.thumb.final-thumb { border-color: #d97706; }
.thumb.final-thumb:hover { border-color: #f59e0b; }
.thumb img { width: 100px; height: 68px; object-fit: contain; display: block; padding: 4px; }
.filmstrip-col-sep { width: 1px; background: #e2e8f0; flex-shrink: 0; margin: 0 4px; align-self: stretch; }

/* ── Grid (panel groups) ── */
.panel-grid {
  flex: 1; min-height: 0; display: flex; flex-wrap: wrap; gap: 10px;
  padding: 16px 24px; overflow-y: auto; align-content: flex-start;
}
/* ── Grid (assets) ── */
.asset-grid {
  flex: 1; min-height: 0; display: flex; flex-wrap: wrap; gap: 12px;
  padding: 16px 24px; overflow-y: auto; align-content: flex-start;
}
/* ── Panel group ── */
.panel-group {
  border: 1px solid #e2e8f0; border-radius: 8px;
  background: #fff; overflow: hidden;
}
.panel-group-header {
  padding: 8px 14px; font-size: 11px; font-weight: 700; color: #059669;
  background: #f0fdf4; border-bottom: 1px solid #e2e8f0; letter-spacing: .3px;
}
.panel-group-sims {
  display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
}
.panel-sim-card {
  cursor: pointer; border-radius: 6px; overflow: hidden;
  border: 2px solid #e2e8f0; background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.05); transition: border-color .15s;
  display: flex; flex-direction: column; align-items: center;
}
.panel-sim-card:hover { border-color: #6ee7b7; }
.panel-sim-card img { width: 180px; height: 140px; object-fit: contain; display: block; padding: 4px; }
.panel-sim-label { padding: 3px 8px; font-size: 9px; color: #64748b; text-align: center;
  border-top: 1px solid #f1f5f9; background: #f8fafc;
  max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Panel comparison card: before → after */
.panel-card {
  border-radius: 8px; overflow: hidden; border: 2px solid #e2e8f0; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; flex-direction: column;
  transition: border-color .15s;
}
.panel-card:hover { border-color: #6ee7b7; }
.panel-card.active { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.18); }
.pc-compare {
  display: flex; align-items: stretch; gap: 0;
}
.pc-half {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 4px; gap: 2px; cursor: pointer;
}
.pc-half:hover img { opacity: .85; }
.pc-half img { width: 110px; height: 86px; object-fit: contain; display: block; border-radius: 4px; }
.pc-half-label { font-size: 8px; color: #94a3b8; }
.pc-arrow {
  display: flex; align-items: center; padding: 0 2px;
  font-size: 14px; color: #cbd5e1; flex-shrink: 0;
}
.pc-footer {
  padding: 3px 8px; font-size: 9px; font-weight: 600; color: #64748b;
  border-top: 1px solid #f1f5f9; background: #f8fafc;
  display: flex; justify-content: space-between; align-items: center;
}
.pc-badge {
  font-size: 8px; padding: 1px 5px; border-radius: 4px;
  background: #f1f5f9; color: #64748b;
}

/* Panels tab — textbox border legend */
.panel-legend {
  width: 100%; margin-bottom: 4px; display: flex; align-items: center; gap: 14px;
  padding: 7px 12px; border-radius: 8px;
  background: #f8fafc; border: 1px solid #e2e8f0;
  font-size: 10px; color: #64748b; flex-shrink: 0; flex-wrap: wrap;
}
.panel-legend-title { font-weight: 700; color: #475569; margin-right: 4px; }
.pl-item { display: flex; align-items: center; gap: 5px; }
.pl-swatch {
  width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0;
  border: 2.5px solid currentColor;
}
.pl-swatch.fit      { color: #16a34a; background: #dcfce7; }
.pl-swatch.overflow { color: #2563eb; background: #dbeafe; }
.pl-swatch.underflow{ color: #d97706; background: #fef3c7; }

/* Single-state panel card (no change) */
.panel-card-single {
  border-radius: 8px; overflow: hidden; border: 2px solid #e2e8f0; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; flex-direction: column;
  transition: border-color .15s; cursor: pointer;
}
.panel-card-single:hover { border-color: #6ee7b7; }
.panel-card-single img { width: 100px; height: 78px; object-fit: contain; display: block; padding: 4px; }
.panel-card-single-label {
  padding: 3px 8px; font-size: 9px; color: #64748b;
  border-top: 1px solid #f1f5f9; background: #f8fafc;
}

/* Asset grid card */
.asset-card {
  cursor: pointer; border-radius: 8px; overflow: hidden;
  border: 2px solid #e2e8f0; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: border-color .15s;
  display: flex; flex-direction: column; align-items: center;
}
.asset-card:hover { border-color: #6ee7b7; }
.asset-card img { width: 140px; height: 110px; object-fit: contain; display: block; padding: 6px; }
.asset-card-label {
  padding: 3px 8px; font-size: 9px; color: #64748b; text-align: center;
  border-top: 1px solid #f1f5f9; background: #f8fafc;
  max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Lightbox ── */
#lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
  z-index: 100; align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px;
                box-shadow: 0 8px 40px rgba(0,0,0,.5); }
#lb-close {
  position: absolute; top: 18px; right: 24px; font-size: 26px;
  color: #e2e8f0; cursor: pointer; line-height: 1;
}
#lb-prev, #lb-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.15); border: none; color: #fff;
  font-size: 32px; cursor: pointer; padding: 12px 18px; border-radius: 8px;
  transition: background .15s;
}
#lb-prev:hover, #lb-next:hover { background: rgba(255,255,255,.25); }
#lb-prev { left: 16px; }
#lb-next { right: 16px; }
#lb-caption {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: #e2e8f0; font-size: 13px; background: rgba(0,0,0,.5);
  padding: 4px 14px; border-radius: 20px;
}

.loading-msg { padding: 20px 16px; color: #94a3b8; font-size: 13px; }

/* ── Outline Tab ── */
.outline-container { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
.outline-scroll    { flex:1; min-height:0; overflow-y:auto; padding:14px 20px 24px; }
.outline-empty     { color:#94a3b8; font-size:13px; text-align:center; padding:40px; }

/* Step sections */
.pipe-step {
  border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.04); flex-shrink:0; margin-bottom:10px;
}
.pipe-step-hd {
  display:flex; align-items:center; gap:8px; padding:10px 14px;
  cursor:pointer; user-select:none;
  background: linear-gradient(135deg,#f8fafc,#fff);
  border-bottom:1px solid #e2e8f0;
}
.pipe-step-hd:hover { background:linear-gradient(135deg,#f1f5f9,#f8fafc); }
.pipe-step-num {
  width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; flex-shrink:0;
  background:#e2e8f0; color:#94a3b8;
}
.pipe-step-num.done    { background:#10b981; color:#fff; }
.pipe-step-num.pending { background:#fbbf24; color:#fff; }
.pipe-step-title { font-size:12px; font-weight:700; color:#1e293b; flex:1; }
.pipe-step-badge { font-size:10px; color:#64748b; flex-shrink:0; display:flex; gap:5px; flex-wrap:wrap; }
.pipe-badge-chip {
  font-size:9px; font-weight:600; padding:1px 7px; border-radius:6px;
  background:#f1f5f9; color:#475569; white-space:nowrap;
}
.pipe-badge-chip.green  { background:#d1fae5; color:#047857; }
.pipe-badge-chip.red    { background:#fee2e2; color:#b91c1c; }
.pipe-badge-chip.blue   { background:#dbeafe; color:#1d4ed8; }
.pipe-step-caret { font-size:10px; color:#94a3b8; flex-shrink:0; transition:transform .18s; }
.pipe-step-caret.closed { transform:rotate(-90deg); }
.pipe-step-body { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
.pipe-step-body.collapsed { display:none; }
.pipe-step-pending { font-size:11px; color:#94a3b8; font-style:italic; padding:4px 0; }

/* Step 1 – asset thumbnails */
.ps-type-label { font-size:9px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
.ps-thumb-grid { display:flex; flex-wrap:wrap; gap:7px; }
.ps-thumb {
  border:1px solid #e2e8f0; border-radius:6px; overflow:hidden; background:#fff;
  cursor:pointer; transition:border-color .15s; flex-shrink:0;
}
.ps-thumb:hover { border-color:#10b981; }
.ps-thumb img { width:100px; height:72px; object-fit:contain; display:block; padding:3px; }
.ps-thumb-cap { font-size:8px; color:#64748b; padding:2px 5px; background:#f8fafc; border-top:1px solid #f1f5f9; max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ps-thumb-empty { width:100px; height:72px; background:#f8fafc; display:flex; align-items:center; justify-content:center; color:#cbd5e1; font-size:20px; }

/* Step 2 – section tree */
.ps-sec-tree { display:flex; flex-direction:column; gap:3px; }
.ps-sec-row { display:flex; align-items:baseline; gap:6px; padding:3px 6px; border-radius:4px; }
.ps-sec-row:hover { background:#f8fafc; }
.ps-sec-name { font-weight:600; color:#1e293b; }
.ps-sec-name.d0 { font-size:12px; color:#1e3a5f; }
.ps-sec-name.d1 { font-size:11px; color:#1d4ed8; }
.ps-sec-name.d2 { font-size:11px; color:#0369a1; }
.ps-sec-name.d3 { font-size:10px; color:#047857; }
.ps-sec-pid  { font-size:9px; color:#94a3b8; flex-shrink:0; }
.ps-sec-meta { font-size:9px; color:#10b981; flex-shrink:0; display:flex; gap:4px; }
.ps-sec-chip { background:#f0fdf4; border-radius:3px; padding:0 5px; color:#059669; }

.ps-bullet-row { font-size:10px; color:#475569; line-height:1.5; }
.ps-child-wrap { padding-left:16px; border-left:2px solid #f1f5f9; margin-left:8px; }

/* Step 2 – dropped assets */
.ps-dropped-label { font-size:9px; font-weight:700; color:#dc2626; margin-top:8px; margin-bottom:4px; }
.ps-dropped-grid  { display:flex; flex-wrap:wrap; gap:5px; }
.ps-dropped-chip  { font-size:9px; color:#64748b; background:#fef2f2; border:1px solid #fecaca; border-radius:4px; padding:2px 7px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Step 3 – horizontal panel tree table */
.ps3-htree { width:100%; border-collapse:collapse; }
.ps3-htree-td {
  vertical-align:top; padding:4px 8px 4px 6px;
  border:1px solid #f1f5f9; background:#fff;
  min-width:80px;
}

  font-size:11px; font-weight:700; color:#047857; margin-bottom:2px;
  white-space:nowrap;
}
.ps3-htree-secs { display:flex; flex-direction:column; gap:1px; }
.ps3-sec-row { display:flex; align-items:baseline; gap:6px; padding:2px 4px; border-radius:4px; }
.ps3-sec-row:hover { background:#f8fafc; }
.ps3-thumbs { display:flex; gap:4px; padding:2px 4px 4px; }
.ps3-badges { display:flex; gap:4px; flex-wrap:wrap; }


/* ── Activity Log ── */
.activity-feed {
  flex: 1; min-height: 0; overflow-y: auto; padding: 16px 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.activity-running-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; color: #059669;
  margin-bottom: 4px;
}
.activity-empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 40px 0; }

.attempt-block {
  border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.05); flex-shrink: 0;
}
.attempt-hd {
  padding: 8px 14px;
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);

  display: flex; align-items: center; gap: 8px;
}
.attempt-phase-badge {
  background: rgba(255,255,255,.18); border-radius: 4px;

}

.phase-section { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; }
.phase-label {
  font-size: 9px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}

/* Layout iter cards */
.layout-iter-card {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 8px 12px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 6px;
}
.layout-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.layout-node { font-size: 11px; font-weight: 600; color: #1e293b; }
.layout-type-badge {
  font-size: 9px; padding: 1px 6px; border-radius: 4px;
  background: #dbeafe; color: #1d4ed8; font-weight: 600;
}
.layout-dir-badge {
  font-size: 9px; padding: 1px 6px; border-radius: 4px;
  background: #ede9fe; color: #6d28d9; font-weight: 600;
}
.layout-nochange { font-size: 9px; color: #94a3b8; font-style: italic; }
.ratio-row { display: flex; align-items: center; gap: 6px; }
.ratio-label { font-size: 10px; color: #64748b; width: 30px; text-align: right; flex-shrink: 0; }
.ratio-track {
  flex: 1; height: 10px; background: #e2e8f0; border-radius: 4px; overflow: hidden; position: relative;

.ratio-fill.before { background: #94a3b8; }

/* Content panel cards */
.content-panel-card {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 8px 12px; margin-bottom: 6px;
}
.content-panel-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.panel-name-chip {
  font-size: 11px; font-weight: 700; color: #1e293b;
  background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 5px; padding: 1px 8px;
}
.iter-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.iter-num { font-size: 9px; color: #94a3b8; width: 34px; flex-shrink: 0; }
.status-pill {

  flex-shrink: 0; min-width: 66px; text-align: center;
}
.status-pill.fit       { background: #d1fae5; color: #047857; }
.status-pill.overflow  { background: #fee2e2; color: #b91c1c; }

.vol-track { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
.vol-fill  { height: 100%; border-radius: 4px; transition: width .3s; }

.vol-fill.overflow  { background: #ef4444; }
.vol-fill.underflow { background: #f59e0b; }
.vol-pct { font-size: 10px; color: #64748b; width: 34px; text-align: right; flex-shrink: 0; font-weight: 600; }

/* Section info inside content panel card */
.sec-info-row {

  font-size: 11px; font-weight: 700; color: #1d4ed8; flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Critic card */
