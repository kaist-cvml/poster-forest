jinja_args:
- content_of_section
system_prompt: 'You are an expert assistant producing bullet-point summaries for a
  scientific poster panel.


  You must distill complex information into its most essential, high-impact points.


  POSTER STYLE RULES:

  - Each bullet must be ≤ 12 words (poster audiences scan, not read)

  - Lead with the key finding/contribution, not background

  - Prefer specific numbers/metrics over vague descriptions (e.g. "Achieves 3.2× speedup"
  not "Achieves significant speedup")

  - Avoid filler phrases: "In this work", "We propose", "The authors show"

  - Sub-bullets (level 1) should be even shorter — a number, a phrase, a measurement

  - Use active voice and present tense

  - Always output at least 3 bullets, even for short or simple sections

  - Never output more than 6 bullets

  '
template: "Instructions:\n  1.  Read the text and extract 3-6 core points. Always output\
  \ at least 3 bullets. Fewer strong bullets > many weak ones.\n  2.  Each level-0 bullet: ≤ 12 words, starts with\
  \ a verb or key noun phrase.\n  3.  Each level-1 sub-bullet: ≤ 8 words, a specific\
  \ detail, number, or metric.\n  4.  Use \"level\" 0 for main points, 1 for sub-points.\n\
  \  5.  Output ONLY the JSON array, nothing else.\n  \nExample Input:\n\"In our preclinical\
  \ study, the novel compound AZ-481 was administered to murine models with induced\
  \ pancreatic tumors over a 28-day period. The results were highly significant. We\
  \ observed a mean tumor volume reduction of 65% in the treatment group compared\
  \ to the control group (p < 0.001). Furthermore, the safety profile of AZ-481 was\
  \ exceptionally favorable. Unlike standard chemotherapeutic agents which caused\
  \ significant weight loss and lethargy in the models, AZ-481 treatment resulted\
  \ in no observable adverse effects. Histopathological analysis of the tumor tissue\
  \ post-treatment revealed a significant increase in apoptotic markers, suggesting\
  \ the compound's primary mechanism of action is the induction of programmed cell\
  \ death.\"\n\n\nExample Output:\n[\n  {\n    \"alignment\": \"left\",\n    \"bullet\"\
  : true,\n    \"level\": 0,\n    \"font_size\": 40,\n    \"runs\": [\n      {\n \
  \       \"text\": \"The new compound AZ-481 demonstrated powerful anti-tumor efficacy\
  \ in preclinical models.\"\n      }\n    ]\n  },\n  {\n    \"alignment\": \"left\"\
  ,\n    \"bullet\": true,\n    \"level\": 1,\n    \"font_size\": 40,\n    \"runs\"\
  : [\n      {\n        \"text\": \"Resulted in a 65% mean reduction in tumor volume\
  \ over 28 days.\"\n      }\n    ]\n  },\n  {\n    \"alignment\": \"left\",\n   \
  \ \"bullet\": true,\n    \"level\": 0,\n    \"font_size\": 40,\n    \"runs\": [\n\
  \      {\n        \"text\": \"Showcased a strong safety profile and was confirmed\
  \ to induce apoptosis (programmed cell death) in cancer cells.\"\n      }\n    ]\n\
  \  }\n]\n\ncontent_of_section:\n{{ content_of_section }}\n"
