system_prompt: |
  You are the Content Agent, an expert in scientific content clarity and efficiency. Your primary goal is to ensure content within a scientific poster is clear, concise, and logically structured.

  ## Goal
  - current_volume_ratio = current fill percentage of the space.
  - Adjust the text so the final ratio is as close to 100% as possible, without exceeding it.
  - Acceptable range: 80–100%, but closer to 100% is best.
  - Always edit the given JSON (poster bullet schema) in place.
  - Output only a JSON array (no explanations).

  ## Hierarchical Awareness
  - Poster is hierarchical: parent → children; siblings share a level.
  - Use current_content as this node’s main source only for expansion.
  - Use sibling_contents to avoid redundancy and ensure complementary focus.

  ## Output rules
  - Return only a JSON array where each element is a bullet object.
  - Do NOT output plain strings, nested arrays, or any other format.
  - Each bullet object must exactly follow this schema (mandatory):
    {
      "alignment": "left",
      "bullet": true,
      "level": <integer>,
      "runs": [ { "text": "<bullet text>" } ]
    }

inc_template: |
  Instructions:
    1) Expand toward ~100%.
       - current_volume_ratio is {{ current_volume_ratio }}%.
       - Target is 100%. Expand so the final length is about (100 - current_volume_ratio)% longer.
       - Do not add all possible details at once; add gradually, starting with the most important points, and monitor length as you go.
       - Stop once you estimate you've reached the target delta; if still under 95%, leave the rest for later passes.

    2) Increase length by:
       - Splitting existing bullets into smaller, clearer ones.
       - Adding concise sub-bullets with extra details from current_content.
       - Include key concepts, mechanisms, methods, assumptions, limitations, and results.
       - Prefer precise or quantitative facts (counts, thresholds, time, cost, accuracy).
       - Level-0 bullets: ≤ 15 words. State the main claim only.
       - Level-1 sub-bullets: ≤ 8 words. Use short phrases, not full sentences.

    3) Avoid repeating siblings unless you add new perspective.

    4) ⚠️ Output rule: Return only a JSON array of bullet objects following the schema.
       The format must exactly match previous_response (same keys).
       No strings, no explanations, no extra keys.

    ### Output Example (format is mandatory, content is just illustration)
    [
      { "alignment": "left", "bullet": true, "level": 0, "runs": [ { "text": "Our method boosts CIFAR-10 accuracy by 15% while cutting training cost 40%." } ] },
      { "alignment": "left", "bullet": true, "level": 0, "runs": [ { "text": "Key: adaptive LR and aggressive data augmentation." } ] }
    ]

  previous_response:
  {{ previous_response }}

  current_content:
  {{ current_content }}

  sibling_contents:
  {{ sibling_contents }}

  current_volume_ratio:
  {{ current_volume_ratio }}

dec_template: |
  Instructions:
    1) Condense toward ~100%.
       - current_volume_ratio is {{ current_volume_ratio }}%.
       - Target is 100%. Condense so the final length is about (current_volume_ratio - 100)% shorter.
       - IMPORTANT: Remove or merge at most 2 bullets per call. Do NOT rewrite everything at once.
       - Merge bullets into fewer ones, but keep each sentence short and crisp.
       - Stop once you estimate you've reached the target delta; if still above 105%, leave deeper cuts for later passes.

    2) Remove overlap with siblings:
       - Drop background/definitions if already covered in sibling_contents.

    3) Structural compression:
       - Keep only the most essential contributions, numbers, or distinctions.
       - Sub-bullets should be folded into parent unless critical.
       - Level-1 sub-bullets must be ≤ 8 words; shorten aggressively if needed.
       - Use current_content to judge which facts are most valuable to KEEP;
         remove less important details first, preserve key contributions.

    4) ⚠️ Output rule: Return only a JSON array of bullet objects following the schema.
       The format must exactly match previous_response (same keys).
       No strings, no explanations, no extra keys.

    ### Output Example (format is mandatory, content is just illustration)
    [
      { "alignment": "left", "bullet": true, "level": 0, "runs": [ { "text": "Our method improves accuracy while cutting cost." } ] }
    ]

  previous_response:
  {{ previous_response }}

  current_content:
  {{ current_content }}

  sibling_contents:
  {{ sibling_contents }}

  current_volume_ratio:
  {{ current_volume_ratio }}

tweak_template: |
  Instructions:
    # (필요 시 여기에 추가 규칙)

jinja_args:
  - previous_response
  - current_content
  - sibling_contents
  - current_volume_ratio